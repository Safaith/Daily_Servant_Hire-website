services:
  - type: web
    name: daily-servant
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn daily_servant_config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: daily-servant-db
          property: connectionString

databases:
  - name: daily-servant-db
    plan: free
